<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Evolución del Financiamiento Escolar en Texas // SOLATX</title>
    <style>
        :root {
            color-scheme: light dark;
            --accent: #ff4d00;
        }

        /* Ajustes de Tema Claro */
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #ffffff;
                --text: #1a1a1a;
                --panel: #f4f4f4;
                --box-bg: #ffffff;
                --table-header: #eeeeee;
                --border: #cccccc;
            }
        }

        /* Ajustes de Tema Oscuro */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --text: #e0e0e0;
                --panel: #161616;
                --box-bg: #000000;
                --table-header: #222222;
                --border: #333333;
            }
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.5; 
        }

        .nav-top { 
            background: var(--panel); 
            padding: 15px; 
            border-bottom: 2px solid var(--accent); 
            text-align: left; 
            margin-bottom: 30px; 
        }

        .nav-top a { color: var(--accent); text-decoration: none; font-weight: bold; }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--panel); 
            padding: 40px; 
            border: 1px solid var(--border); 
        }

        h1 { color: var(--accent); text-transform: uppercase; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        h2 { background: var(--table-header); padding: 10px; font-size: 1.2rem; margin-top: 40px; border-left: 5px solid var(--accent); }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: var(--table-header); color: var(--accent); text-align: left; padding: 12px; border: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 12px; border: 1px solid var(--border); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
